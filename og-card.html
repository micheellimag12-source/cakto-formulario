<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; }
  body {
    width: 1200px;
    height: 630px;
    font-family: 'Manrope', -apple-system, BlinkMacSystemFont, sans-serif;
    color: #1e1e1e;
    position: relative;
    overflow: hidden;
    background:
      radial-gradient(900px 600px at 82% 18%, rgba(255, 220, 160, .55) 0%, transparent 60%),
      radial-gradient(900px 540px at 10% 100%, rgba(47, 87, 51, .35) 0%, transparent 62%),
      linear-gradient(135deg, #d4be9f 0%, #e2cfb7 45%, #cdb693 100%);
  }
  /* sun glow */
  .sun {
    position: absolute;
    top: -180px;
    right: -180px;
    width: 620px;
    height: 620px;
    border-radius: 50%;
    background: radial-gradient(closest-side,
      rgba(255, 220, 160, .75) 0%,
      rgba(226, 207, 183, .25) 45%,
      transparent 75%);
    filter: blur(20px);
  }
  /* film grain via SVG turbulence */
  .grain {
    position: absolute;
    inset: 0;
    opacity: .07;
    mix-blend-mode: overlay;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  }
  .vignette {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center,
      transparent 50%,
      rgba(30, 30, 30, .14) 85%,
      rgba(30, 30, 30, .28) 100%);
  }
  /* particle dots */
  .dots {
    position: absolute; inset: 0;
  }
  .dot {
    position: absolute;
    border-radius: 50%;
    background: rgba(47, 87, 51, .45);
  }

  .stage {
    position: absolute;
    inset: 70px 80px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    z-index: 2;
  }
  .top {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .logo-block { height: 95px; }
  .logo-block img { height: 100%; width: auto; display: block; }
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 15px;
    font-weight: 700;
    color: #2f5733;
    background: rgba(255, 255, 255, .85);
    padding: 10px 18px;
    border-radius: 999px;
    border: 1px solid rgba(47, 87, 51, .18);
    letter-spacing: .04em;
    text-transform: uppercase;
    box-shadow: 0 6px 16px -4px rgba(47, 87, 51, .25);
  }
  .badge::before {
    content: "";
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #2f5733;
    box-shadow: 0 0 0 4px rgba(47, 87, 51, .18);
  }

  .headline {
    font-size: 96px;
    font-weight: 800;
    line-height: .96;
    letter-spacing: -.025em;
    margin: 0;
    max-width: 980px;
  }
  .headline .accent { color: #2f5733; }
  .sub {
    font-size: 26px;
    color: #3a3a3a;
    line-height: 1.35;
    max-width: 820px;
    margin-top: 22px;
    font-weight: 500;
    letter-spacing: -.005em;
  }

  .footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .url {
    font-size: 24px;
    font-weight: 800;
    letter-spacing: .04em;
    color: #2f5733;
    display: flex; align-items: center; gap: 12px;
  }
  .url::before {
    content: "";
    width: 28px; height: 2px;
    background: #2f5733;
    border-radius: 2px;
  }
  .pills {
    display: flex;
    gap: 10px;
    font-size: 17px;
  }
  .pill {
    background: rgba(255,255,255,.82);
    padding: 10px 16px;
    border-radius: 999px;
    border: 1px solid rgba(47, 87, 51, .15);
    font-weight: 700;
    color: #1e1e1e;
    letter-spacing: -.005em;
  }
  .pill.green {
    background: #2f5733;
    color: #fff;
    border-color: #2f5733;
  }
</style>
</head>
<body>
  <div class="sun"></div>
  <div class="dots">
    <!-- subtle particle dots, hand-placed -->
    <span class="dot" style="left:18%; top:32%; width:5px; height:5px; opacity:.5"></span>
    <span class="dot" style="left:42%; top:14%; width:3px; height:3px; opacity:.4; background:rgba(226,207,183,.85)"></span>
    <span class="dot" style="left:78%; top:48%; width:4px; height:4px; opacity:.45"></span>
    <span class="dot" style="left:62%; top:72%; width:3px; height:3px; opacity:.35; background:rgba(226,207,183,.85)"></span>
    <span class="dot" style="left:8%;  top:62%; width:4px; height:4px; opacity:.4"></span>
    <span class="dot" style="left:88%; top:22%; width:6px; height:6px; opacity:.55; background:rgba(125,200,140,.6)"></span>
    <span class="dot" style="left:30%; top:78%; width:3px; height:3px; opacity:.4"></span>
    <span class="dot" style="left:52%; top:42%; width:2px; height:2px; opacity:.3; background:rgba(226,207,183,.85)"></span>
  </div>
  <div class="grain"></div>
  <div class="vignette"></div>

  <div class="stage">
    <div class="top">
      <div class="logo-block">
        <img src="logo.svg" alt="Cakto"/>
      </div>
      <span class="badge">Migração assistida</span>
    </div>
    <div>
      <h1 class="headline">Vamos migrar<br><span class="accent">seu produto</span></h1>
      <p class="sub">Operação sólida, segura e lucrativa. A menor taxa do mercado com o saque mais rápido — receba 100% das vendas no Pix.</p>
    </div>
    <div class="footer">
      <div class="url">cakto.me/formulario</div>
      <div class="pills">
        <span class="pill green">Saque instantâneo</span>
        <span class="pill">0% + R$ 2,49</span>
        <span class="pill">100% seguro</span>
      </div>
    </div>
  </div>
</body>
</html>
